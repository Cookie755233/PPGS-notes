# Hugo configuration file
title: PPGS

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)']]
        enable: true
      extras:
        mark:
          enable: true
  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    # - name: Docs
    #   pageRef: /docs
    #   weight: 1
    # - name: About
    #   pageRef: /about
    #   weight: 2
    # - name: Contact ↗
    #   url: "https://github.com/imfing"
    #   weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    # - name: GitHub
    #   weight: 5
    #   url: "https://github.com/imfing/hextra-starter-template"
    #   params:
    #     icon: github
    # - name: Twitter
    #   weight: 6
    #   url: "https://twitter.com/"
    #   params:
    #     icon: x-twitter

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/favicon.svg
      dark: images/favicon.svg
      width: 20
      height: 20
  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: false
    # base: "https://github.com/Cookie755233/TwoRed-TwoWhite/edit/main/content"

  disableSidebar: false
  displayMainMenus: true # Hides top bar navigation links
  sidebar:
    defaultOpenLevel: 2 # Automatically expands GN, MET, POF submenus
    autoCollapse: false

  imageZoom:
    enable: true
